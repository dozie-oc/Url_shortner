{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<h1>URL Shortener</h1>

<form method="POST">
    <label for="url">Enter URL</label>
    <input
        type="url"
        id="url"
        name="url"
        placeholder="https://example.com"
        required
    >
    <button type="submit">Shorten</button>
</form>

{% if short_url %}
    <h2>Short URL</h2>
    <p>
        <a href="{{ short_url }}">{{ short_url }}</a>
    </p>
{% endif %}
{% endblock %}
