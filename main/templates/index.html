{% extends "base.html" %}

{% block title %}Home{% endblock %}
{% block styles %}
<style>
body {
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
{% endblock %}

{% block content %}
<h1>URL Shortener</h1>

<form method="POST">
    {{form.hidden_tag()}}
    <label for="url">Enter URL</label>
    <input
        type="url"
        id="url"
        name="url"
        placeholder="https://example.com"
        required
    >
    <button type="submit">Shorten</button>
</form>

{% if short_url %}
    <div class="short-url-container success">
        <h2>Your Short URL</h2>
        <p>
            <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
        </p>
        <small style="color: #64748b; margin-top: 1rem; display: block;">
            Click the link to test <!-- Copied to clipboard automatically (optional JS) -->
        </small>
    </div>
{% endif %}
{% endblock %}
